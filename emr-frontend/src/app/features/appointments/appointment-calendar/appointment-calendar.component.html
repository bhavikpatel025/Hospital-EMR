<section class="py-2">
  <div class="card p-4 rounded-4 shadow-sm border-0 bg-white">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 pb-3 mb-4 border-bottom">
      <div>
        <h3 class="m-0 fw-bold text-dark fs-5">Interactive Appointment Calendar</h3>
        <p class="m-0 text-muted small mt-1">
          Drag & drop events to quickly reschedule or click on any date slot to create a quick appointment.
        </p>
      </div>

      <div class="d-flex align-items-center gap-2 flex-wrap">
        <p-dropdown 
          [options]="doctorOptions" 
          [(ngModel)]="doctorFilter" 
          (onChange)="onDoctorFilterChange()" 
          placeholder="All Doctors"
          styleClass="shadow-sm w-auto min-w-max">
        </p-dropdown>

        <p-button 
          label="List View" 
          icon="pi pi-table" 
          severity="secondary" 
          variant="outlined" 
          styleClass="shadow-sm px-3 py-2 fw-semibold" 
          (onClick)="onList()">
        </p-button>

        <p-button 
          label="New appointment" 
          icon="pi pi-plus" 
          severity="primary" 
          styleClass="shadow-sm px-3 py-2 fw-semibold" 
          (onClick)="onAdd()">
        </p-button>
      </div>
    </div>

    <!-- Calendar Container -->
    <div class="calendar-wrapper mt-2">
      <full-calendar #calendar [options]="calendarOptions"></full-calendar>
    </div>
  </div>
</section>
